<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Subscription Manager</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    >

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- Top navigation bar -->
    <header class="navbar">
        <div class="navbar__container">
            <a href="/" class="navbar__brand">
                Smart Subscription Manager
            </a>
        </div>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div
                    id="flash-message"
                    class="flash-message flash-{{ category }}"
                >
        
                    {% if category == "success" %}
                        <i class="bi bi-check-circle-fill flash-message__icon"></i>
                    {% endif %}
        
                    <span>{{ message }}</span>
        
                </div>


            {% endfor %}
        {% endif %}
    {% endwith %}

{% block content %}
{% endblock %}

<script>
    const flashMessage = document.getElementById("flash-message");

    if (flashMessage) {
        setTimeout(() => {
            flashMessage.style.transition = "opacity 0.5s ease";
            flashMessage.style.opacity = "0";

            setTimeout(() => {
                flashMessage.remove();
            }, 500);
        }, 3000);
    }
</script>

<script src="{{ url_for('static', filename='js/form-warning.js') }}"></script>

<script src="{{ url_for('static', filename='js/renewal-date.js') }}"></script>

</body>

</html>
