{% extends "base.html" %}

{% block content %}
    <main class="form-page">
        <div class="form-page__container">

            <h1 class="dashboard__welcome">Add Subscription</h1>

            <form method="post" action="#">

                <p>
                    <label for="subscription_name">Subscription Name</label><br>
                    <input type="text" id="subscription_name" name="subscription_name" required>
                </p>

                <p>
                    <label for="category">Category</label><br>
                    <select id="category" name="category" required>
                        <option value="">-- Select a category --</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Music">Music</option>
                        <option value="Video Streaming">Video Streaming</option>
                        <option value="Productivity">Productivity</option>
                        <option value="AI">AI</option>
                        <option value="Cloud Storage">Cloud Storage</option>
                        <option value="Education">Education</option>
                        <option value="Gaming">Gaming</option>
                        <option value="Fitness">Fitness</option>
                        <option value="Finance">Finance</option>
                        <option value="Other">Other</option>
                    </select>
                </p>

                <p>
                    <label for="amount">Amount (THB)</label><br>
                    <input type="number" id="amount" name="amount" step="0.01" min="0" required>
                </p>

                <p>
                    <label for="billing_frequency">Billing Frequency</label><br>
                    <select id="billing_frequency" name="billing_frequency" required>
                        <option value="">Select billing frequency</option>
                        <option value="Weekly">Weekly</option>
                        <option value="Monthly">Monthly</option>
                        <option value="Every 3 Months">Every 3 Months</option>
                        <option value="Every 6 Months">Every 6 Months</option>
                        <option value="Yearly">Yearly</option>
                    </select>
                </p>

                <p>
                    <label for="start_date">Start Date</label><br>
                    <input type="date" id="start_date" name="start_date" required>
                </p>

                <p>
                    <label for="next_renewal_date">Next Renewal Date</label><br>
                    <input type="date" id="next_renewal_date" name="next_renewal_date" required>
                </p>

                <p>
                    <label for="status">Status</label><br>
                    <select id="status" name="status" required>
                        <option value="">Select status</option>
                        <option value="Active">Active</option>
                        <option value="Paused">Paused</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </p>

                <button type="submit" class="dashboard__add-btn">Save Subscription</button>

            </form>

        </div>
    </main>
{% endblock %}
